<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Overcast by Doomkey</title>
		<meta name="description" content="Generate cover page for report/lab/assignment." />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Overcast" />
		<meta property="og:url" content="https://doomkey.github.io/overcast/" />
		<meta property="og:description" content="Cover-page generator for reports/assignmemts etc." />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<!-- 100% privacy-first analytics -->
		<script
			data-collect-dnt="true"
			async
			src="https://scripts.simpleanalyticscdn.com/latest.js"
		></script>
	</body>
</html>
